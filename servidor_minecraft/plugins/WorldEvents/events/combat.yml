# ============================================================================
# COMBAT.YML - Combat-Focused Events
# ============================================================================
#
# This file contains events that modify combat mechanics, mob behavior,
# damage immunity, and loot drops from combat.
#
# EVENT TYPES IN THIS FILE:
#
# 1. VAMPIRISM
#    Description: Players heal when dealing damage to entities
#    Configuration:
#      heal-percentage: 0.25    # Percentage of damage dealt healed (0.25 = 25%)
#
# 2. BUFF_SPAWNED_MOBS
#    Description: Newly spawned mobs get enhanced with effects and equipment
#    Configuration:
#      target-mobs:             # List of mob types to buff
#        - ZOMBIE
#        - SKELETON
#      potion-effects:          # Effects to apply to mobs
#        - type: SPEED
#          amplifier: 1
#      equipment:               # Equipment to give mobs
#        helmet: IRON_HELMET
#        chestplate: IRON_CHESTPLATE
#        leggings: IRON_LEGGINGS
#        boots: IRON_BOOTS
#        weapon: IRON_SWORD
#      equipment-drop-chance: 0.15  # Chance equipment drops (0.0-1.0)
#
# 3. MOB_LOOT_MULTIPLIER
#    Description: Multiply the amount of items dropped by mobs
#    Configuration:
#      multiplier: 2.0          # Multiply drops by this amount
#
# 4. DAMAGE_IMMUNITY
#    Description: Players become immune to specific damage types
#    Configuration:
#      immune-causes:           # List of damage causes to block
#        - FIRE
#        - FIRE_TICK
#        - LAVA
#        - FALL
#        - DROWNING
#        - ENTITY_EXPLOSION
#        - BLOCK_EXPLOSION
#        - POISON
#        - WITHER
#        - HOT_FLOOR
#        - FREEZE
#
# 5. MOB_SPAWN_MULTIPLIER
#    Description: Increase the rate of natural mob spawning
#    Configuration:
#      spawn-multiplier: 2.0    # Multiply spawn rate by this amount
#
# 6. EXPLODING_MOBS
#    Description: Mobs explode when they die
#    Configuration:
#      explosion-power: 2.0     # Explosion strength
#      break-blocks: false      # Whether explosion breaks blocks
#      set-fire: false          # Whether explosion sets fire
#      chance: 0.5              # Chance mob explodes (0.0-1.0)
#
# Tips:
#   - Balance vampirism carefully - high percentages make players invincible
#   - Use conditions to make mob events night-only for extra challenge
#   - Combine buff_mobs with mob_spawn_multiplier for intense combat
#   - Damage immunity events are great for dimension-specific challenges
#   - Use triggers to chain combat events together
#
# ============================================================================

events:
  vampirism:
    enabled: true
    type: VAMPIRISM
    duration: 300
    announcement: "<gradient:red:dark_red>🩸 Vampirism</gradient> <gray>- Heal by dealing damage!"
    display-name: "<gradient:red:dark_red>🩸 Vampirism</gradient>"
    weight: 10
    heal-percent: 25
    bossbar-color: RED
    bossbar-style: PROGRESS
    symbol: "⚔"
    start-sound: ENTITY_ENDER_DRAGON_GROWL
    
  buff_mobs:
    enabled: true
    type: BUFF_SPAWNED_MOBS
    duration: 240
    announcement: "<gradient:red:#FF5500>⚔ Buffed Mobs</gradient> <gray>- Stronger enemies ahead!"
    display-name: "<gradient:red:#FF5500>⚔ Buffed Mobs</gradient>"
    symbol: "⚔"
    weight: 8
    effects:
      - type: SPEED
        amplifier: 1
        duration: 999999
      - type: STRENGTH
        amplifier: 0
        duration: 999999
    equipment:
      helmet: IRON_HELMET
      chestplate: IRON_CHESTPLATE
      leggings: IRON_LEGGINGS
      boots: IRON_BOOTS
      hand: IRON_SWORD
    bossbar-color: RED
    
  damage_immunity:
    enabled: true
    type: DAMAGE_IMMUNITY
    duration: 180
    announcement: "<gradient:blue:aqua>🛡 Damage Immunity</gradient> <gray>- Fire & Ice protection!"
    display-name: "Fire & Ice Protection"
    weight: 12
    damage-types:
      - FIRE
      - FIRE_TICK
      - LAVA
      - HOT_FLOOR
      - FREEZE
    bossbar-color: BLUE
    symbol: "🛡"
    
  mob_loot_boost:
    enabled: true
    type: MOB_LOOT_MULTIPLIER
    duration: 300
    announcement: "<gradient:gold:yellow>💰 Loot Boost</gradient> <gray>- Double mob drops!"
    display-name: "<gradient:gold:yellow>💰 Loot Boost</gradient>"
    symbol: "💰"
    weight: 10
    multiplier: 2.0
    bossbar-color: YELLOW
    
  exploding_mobs:
    enabled: true
    type: EXPLODING_MOBS
    duration: 180
    announcement: "<gradient:gold:red>💥 Exploding Mobs</gradient> <gray>- Mobs explode on death!"
    display-name: "<gradient:gold:red>💥 Exploding Mobs</gradient>"
    weight: 6
    explosion-power: 2.0
    break-blocks: false
    set-fire: false
    chance: 0.5
    bossbar-color: RED
    symbol: "💥"
    
  mob_spawn_surge:
    enabled: true
    type: MOB_SPAWN_MULTIPLIER
    duration: 240
    announcement: "<gradient:dark_red:red>👹 Mob Surge</gradient> <gray>- Increased mob spawns!"
    display-name: "<gradient:dark_red:red>👹 Mob Surge</gradient>"
    symbol: "👹"
    weight: 8
    spawn-multiplier: 3.0
    bossbar-color: RED

