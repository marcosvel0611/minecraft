  harvest-festival:
    enabled: true
    type: BUMPER_HARVEST
    duration: 540
    announcement: "<gradient:yellow:#FF5500>🎉 Harvest Festival</gradient> <gray>- Celebration time!"
    display-name: "Harvest Festival"
    symbol: "🎃"
    weight: 20
    bossbar-color: YELLOW
    conditions:
      time: DAY
      weather: CLEAR
    multiplier: 3.5
    start-sound: ENTITY_VILLAGER_CELEBRATE
    ambient-sound: ENTITY_CHICKEN_AMBIENT
    ambient-volume: 0.2
