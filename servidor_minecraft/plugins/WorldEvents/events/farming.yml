    duration: 480
    announcement: "<gradient:yellow:gold>🌾 Blessed Harvest Day</gradient> <gray>- Divine bounty!"
    display-name: "Blessed Harvest"
    symbol: "✨"
    weight: 20
    bossbar-color: YELLOW
    conditions:
      time: DAY
      weather: CLEAR
    multiplier: 3.0
    start-sound: ENTITY_VILLAGER_YES
    ambient-sound: ENTITY_CHICKEN_AMBIENT
    ambient-volume: 0.2
    ambient-pitch: 1.2

  lumberjack:
