    duration: 480
    announcement: "<gradient:blue:aqua>🎣 Lucky Fishing</gradient> <gray>- Better catches!"
    display-name: "Lucky Fishing"
    symbol: "🎣"
    weight: 28
    bossbar-color: BLUE
    start-sound: ENTITY_FISHING_BOBBER_SPLASH
    treasure-chance: 0.3
    junk-chance: 0.05

  master-angler:
    enabled: true
    type: FISHING_FORTUNE
    duration: 300
    announcement: "<gradient:blue:dark_aqua>🎣 Master Angler</gradient> <gray>- Triple fishing luck!"
    display-name: "Master Angler"
    symbol: "🐟"
    weight: 16
    bossbar-color: BLUE
    start-sound: ENTITY_FISHING_BOBBER_RETRIEVE
    treasure-chance: 0.5
    junk-chance: 0.02

  neptunes-blessing:
    enabled: true
    type: FISHING_FORTUNE
    duration: 240
    announcement: "<gradient:blue:purple>🔱 Neptune's Blessing</gradient> <gray>- Legendary catches!"
    display-name: "Neptune's Blessing"
    symbol: "🔱"
    weight: 10
    bossbar-color: BLUE
    start-sound: ITEM_TRIDENT_RIPTIDE_3
