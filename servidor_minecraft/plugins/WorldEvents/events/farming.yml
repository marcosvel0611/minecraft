    display-name: "Lumberjack"
    symbol: "🪓"
    weight: 26
    bossbar-color: GREEN
    start-sound: BLOCK_WOOD_BREAK
    max-blocks: 100

  timber:
    enabled: true
    type: TREE_FELLER
    duration: 480
    announcement: "<gradient:#8B4513:dark_green>🌲 TIMBER!</gradient> <gray>- Trees fall fast!"
    display-name: "TIMBER!"
    symbol: "🌲"
    weight: 24
    bossbar-color: YELLOW
    start-sound: ENTITY_ZOMBIE_ATTACK_WOODEN_DOOR
