    type: MODIFY_BLOCK_DROPS
    duration: 420
    announcement: "<gradient:gold:yellow>✨ Gold Rush</gradient> <gray>- Triple gold!"
    display-name: "<gradient:gold:yellow>✨ Gold Rush</gradient>"
    symbol: "💰"
    weight: 20
    bossbar-color: YELLOW
    start-sound: ENTITY_EXPERIENCE_ORB_PICKUP
    target-blocks:
      - GOLD_ORE
      - DEEPSLATE_GOLD_ORE
      - NETHER_GOLD_ORE
    custom-drops:
      - material: RAW_GOLD
        amount: 3
        chance: 1.0
      - material: GOLD_INGOT
        amount: 1
        chance: 0.15

  iron-abundance:
    enabled: true
    type: MODIFY_BLOCK_DROPS
    duration: 540
    announcement: "<gradient:white:gray>⚙ Iron Abundance</gradient> <gray>- Triple iron!"
    display-name: "<gradient:white:gray>⚙ Iron Abundance</gradient>"
    symbol: "⚙"
    weight: 30
    bossbar-color: WHITE
    start-sound: BLOCK_ANVIL_PLACE
    target-blocks:
      - IRON_ORE
      - DEEPSLATE_IRON_ORE
    custom-drops:
      - material: RAW_IRON
        amount: 3
        chance: 1.0

  double-xp:
    enabled: true
    type: XP_MULTIPLIER
    duration: 600
    announcement: "<gradient:green:#55FF55>✨ Double XP</gradient> <gray>- Twice the experience!"
    display-name: "<gradient:green:#55FF55>✨ Double XP</gradient>"
    symbol: "✨"
    weight: 30
    bossbar-color: GREEN
    start-sound: ENTITY_PLAYER_LEVELUP
