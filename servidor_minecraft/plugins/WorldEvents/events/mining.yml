    symbol: "💚"
    weight: 10
    bossbar-color: GREEN
    start-sound: ENTITY_VILLAGER_YES
    target-blocks:
      - EMERALD_ORE
      - DEEPSLATE_EMERALD_ORE
    custom-drops:
      - material: EMERALD
        amount: 2
        chance: 1.0
      - material: EMERALD
        amount: 2
        chance: 0.30

  gold-rush:
