  unbreakable-tools:
    enabled: true
    type: DURABILITY_PROTECTION
    duration: 480
    announcement: "<gradient:blue:aqua>🛡 Unbreakable Tools</gradient> <gray>- Tools never break!"
    display-name: "<gradient:blue:aqua>🛡 Unbreakable Tools</gradient>"
    symbol: "🛡"
    weight: 25
    bossbar-color: BLUE
    start-sound: BLOCK_ANVIL_USE

  eternal-equipment:
    enabled: true
    type: DURABILITY_PROTECTION
    duration: 360
    announcement: "<gradient:yellow:gold>⚡ Eternal Equipment</gradient> <gray>- No durability loss!"
    display-name: "<gradient:yellow:gold>⚡ Eternal Equipment</gradient>"
    symbol: "⚡"
    weight: 22
    bossbar-color: YELLOW
    start-sound: ITEM_ARMOR_EQUIP_DIAMOND

  instant-smelt:
    enabled: true
    type: AUTO_SMELT
    duration: 480
    announcement: "<gradient:red:#FF5500>🔥 Instant Smelt</gradient> <gray>- Ores drop smelted!"
    display-name: "<gradient:red:#FF5500>🔥 Instant Smelt</gradient>"
    symbol: "🔥"
    weight: 28
    bossbar-color: RED
    start-sound: BLOCK_FURNACE_FIRE_CRACKLE

  furnace-blessing:
    enabled: true
    type: AUTO_SMELT
    duration: 600
    announcement: "<gradient:gold:yellow>⚒ Furnace Blessing</gradient> <gray>- Auto-smelt active!"
    display-name: "<gradient:gold:yellow>⚒ Furnace Blessing</gradient>"
    symbol: "⚒"
    weight: 25
    bossbar-color: YELLOW
